<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vecinos La Tradición — Francisco Alvarez</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde: #1D9E75;
    --azul: #378ADD;
    --naranja: #D85A30;
    --rosa: #C94B7B;
    --ambar: #BA7517;
    --gris: #7a7a78;
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a18;
    --text-muted: #6b6b68;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .badge {
    display: inline-block;
    background: #eef9f4;
    color: var(--verde);
    border: 1px solid #c0e8d6;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  /* MAPA */
  #mapa-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #e8e4dc;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #mapa-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .calle-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    fill: #555;
    font-weight: 500;
  }

  .calle-label-vert {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    fill: #666;
    font-weight: 500;
  }

  .marker-group { cursor: pointer; }
  .marker-group circle { transition: r 0.15s, filter 0.15s; }
  .marker-group:hover circle { filter: brightness(1.15); }
  .marker-group text { pointer-events: none; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; fill: white; text-anchor: middle; dominant-baseline: central; }

  /* PANEL */
  #panel {
    width: 0;
    overflow: hidden;
    transition: width 0.25s ease;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  #panel.open { width: 300px; }

  #panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  #panel-calle {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  #panel-num {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
  }

  #panel-count {
    font-size: 11px;
    background: #f0f0ee;
    color: var(--text-muted);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: -2px;
  }

  #close-btn:hover { background: #f0f0ee; }

  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .vecino-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
    background: #fafaf8;
    transition: border-color 0.15s;
  }

  .vecino-card:hover { border-color: rgba(0,0,0,0.2); }

  .v-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
    margin-bottom: 8px;
  }

  .v-nombre {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .v-tel {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }

  .v-tel a {
    color: inherit;
    text-decoration: none;
  }

  .v-tel a:hover { color: var(--verde); }

  .v-nota {
    font-size: 11px;
    color: #999;
    margin-top: 5px;
    font-style: italic;
    border-top: 1px solid #eee;
    padding-top: 5px;
    line-height: 1.4;
  }

  /* LEYENDA */
  #leyenda {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    backdrop-filter: blur(4px);
  }

  .ley-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: #444;
  }

  .ley-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* TOTAL */
  #total-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    backdrop-filter: blur(4px);
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: rgba(20,20,18,0.88);
    color: #fff;
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 6px;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
    font-family: 'DM Sans', sans-serif;
  }

  @media (max-width: 600px) {
    .layout { flex-direction: column; height: auto; }
    #mapa-wrap { height: 55vh; }
    #panel.open { width: 100%; height: 45vh; }
    #leyenda { display: none; }
  }
</style>
</head>

<header>

  <div id="panel">

};

const svg = document.getElementById('markers-layer');
const tooltip = document.getElementById('tooltip');
const mapa = document.getElementById('mapa-wrap');

Object.entries(grupos).forEach(([dir, vecs]) => {
  const pos = POSICIONES[dir];
  if (!pos) return;

  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","marker-group");

  const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
  c.setAttribute("cx", pos.x);
  c.setAttribute("cy", pos.y);
  c.setAttribute("r", vecs.length > 1 ? 13 : 10);
  c.setAttribute("fill", pos.c);
  c.setAttribute("stroke","white");
  c.setAttribute("stroke-width","2");

  const t = document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x", pos.x);
  t.setAttribute("y", pos.y);
  t.textContent = vecs.length;

  g.appendChild(c);
  g.appendChild(t);

  g.addEventListener("click", () => showPanel(dir, vecs, pos.c));

  g.addEventListener("mousemove", (e) => {
    const rect = mapa.getBoundingClientRect();
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 10) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
    tooltip.textContent = dir + ' (' + vecs.length + ' vecino' + (vecs.length>1?'s':'') + ')';
  });

  g.addEventListener("mouseleave", () => { tooltip.style.display = 'none'; });

  svg.appendChild(g);
});

const COLORES_AVATAR = ["#1D9E75","#378ADD","#D85A30","#C94B7B","#BA7517","#7F77DD","#885A3A"];
let colorIdx = 0;

function showPanel(dir, vecs, color) {
  const panel = document.getElementById('panel');
  panel.classList.add('open');
  document.getElementById('panel-calle').textContent = dir;
  document.getElementById('panel-num').textContent = '';
  document.getElementById('panel-count').textContent = vecs.length + ' vecino' + (vecs.length>1?'s':'');
  document.getElementById('panel-calle').style.color = color;

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  vecs.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'vecino-card';

    const av = document.createElement('div');
    av.className = 'v-avatar';
    av.style.background = COLORES_AVATAR[i % COLORES_AVATAR.length];
    av.textContent = initiales(v.nombre);

    const nombre = document.createElement('div');
    nombre.className = 'v-nombre';
    nombre.textContent = v.nombre;

    // Limpiar número y formatear
    const telClean = v.tel.replace(/\s+/g,'');
    const telDiv = document.createElement('div');
    telDiv.className = 'v-tel';
    const telLink = document.createElement('a');
    telLink.href = 'tel:' + telClean;
    telLink.textContent = v.tel;
    telDiv.appendChild(telLink);

    // WhatsApp link
    const waNum = telClean.replace(/\+/,'').replace(/-/g,'');
    const waLink = document.createElement('a');
    waLink.href = 'https://wa.me/' + waNum;
    waLink.target = '_blank';
    waLink.style.cssText = 'margin-left:8px;font-size:11px;color:#25D366;font-weight:500;text-decoration:none;';
    waLink.textContent = 'WA';
    telDiv.appendChild(waLink);

    card.appendChild(av);
    card.appendChild(nombre);
    card.appendChild(telDiv);

    if (v.nota) {
      const nota = document.createElement('div');
      nota.className = 'v-nota';
      nota.textContent = v.nota;
      card.appendChild(nota);
    }

    body.appendChild(card);
  });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}
</script>
</body>
</html>
